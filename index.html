<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="./assets/netflix-logo.ico" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabor Netflix</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header class="topbar">
        <div class="logo">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" href="./index.html" alt="Logo da Netflix">
        </div>
        <div class="switch">
            <button id="theme-toggle" class="theme-btn" aria-label="Alternar tema" aria-pressed="false">🌙</button>
        </div>
    </header>
    <main>
        <h1>Quem está assistindo?</h1>
        <section aria-label="Perfis disponíveis">
                    <ul class="profiles-outer">
                        <ul class="profiles" aria-label="Lista de perfis">
                            <li class="item-profile">
                                <a href="./catalogo.html" class="profile">
                                    <figure>
                                        <img class="profile-icon" src="./assets/perfil 1.jpg" alt="Um personargem de boa aparência olhando para frente de cabelo preto e com cenário medieval atrás.">
                                        <figcaption class="nome-profile">Victor</figcaption>
                                    </figure>
                                </a>
                            </li>
                            <li class="item-profile">
                                <a href="./catalogo.html" class="profile">
                                    <figure>
                                        <img class="profile-icon" src="./assets/perfil 2.jpg" alt="Um personagem que é um ferreiro que está usando sua forja.">
                                        <figcaption class="nome-profile">Wesley</figcaption>
                                    </figure>
                                </a>
                            </li>
                            <li class="item-profile">
                                <a href="./catalogo.html" class="profile">
                                    <figure>
                                        <img class="profile-icon" src="./assets/perfil 3.jpg" alt="Um personagem de perfil no estilo do studio ghibli com cenário de cidade do interior no fundo.">
                                        <figcaption class="nome-profile">Dani</figcaption>
                                    </figure>
                                </a>
                            </li>
                            <li class="item-profile">
                                <a href="./catalogo.html" class="profile">
                                    <figure>
                                        <img class="profile-icon" src="./assets/perfil 4.jpg" alt="Um personagem com traje espacial no estilo do studio ghibli com cenário pós apocalíptico no fundo.">
                                        <figcaption class="nome-profile">Ian</figcaption>
                                    </figure>
                                </a>
                            </li>
                        </ul>
                   </ul>
        </section>
    </main>
    <script src="./js/script.js" defer></script>
</body>
</html>
